<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷氣安裝線上估價系統</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
    </style>
</head>
<body>
<div class="container mb-5">
    <div class="card p-4">
        <h2 class="text-center mb-4">冷氣安裝估價單</h2>
        <form id="estimationForm">
            <div class="step active" id="step1">
                <h4>第一步：基本需求</h4>
                <div class="mb-3"><label class="form-label">服務類型</label><select class="form-select" name="serviceType"><option value="安裝">安裝</option><option value="拆,移機">拆,移機</option></select></div>
                <div class="mb-3"><label class="form-label">冷氣類型</label><select class="form-select" id="acType" name="acType"><option value="分離式變頻空調冷氣">分離式變頻空調冷氣</option><option value="窗型變頻空調冷氣">窗型變頻空調冷氣</option></select></div>
                <div class="mb-3"><label class="form-label">預計安裝坪數</label><select class="form-select" id="areaSize" name="areaSize"></select></div>
                <div class="mb-3"><label class="form-label">室外機架</label><select class="form-select" name="bracket" data-price="0"><option value="不需架子(落地)" data-price="0">不需架子(落地)</option><option value="室外機L架(鍍鋅)" data-price="1000">室外機L架(鍍鋅)</option></select></div>
                <div class="mb-3"><label class="form-label">室內機排水器</label><select class="form-select" name="drainPump"><option value="不需要" data-price="0">不需要</option><option value="室內機靜音排水器" data-price="2800">室內機靜音排水器</option></select></div>
                <div class="mb-3"><label class="form-label">超出標配銅管(米)</label><select class="form-select" name="extraPipe"><option value="無" data-price="0">無</option><option value="2分/3分" data-price="450">2分/3分</option></select><input type="number" class="form-control mt-2" name="pipeLength" value="0"></div>
                <div class="mb-3"><label class="form-label">舊機拆除</label><select class="form-select" name="oldRemoval"><option value="不需要" data-price="0">不需要</option><option value="分離式舊機拆除" data-price="1800">分離式舊機拆除</option></select></div>
                <div class="mb-3"><label class="form-label">電源線配置</label><select class="form-select" name="powerWire"><option value="不需要" data-price="0">不需要</option><option value="3.5mm" data-price="150">3.5mm</option></select><input type="number" class="form-control mt-2" name="wireLength" value="0"></div>
                <div class="mb-3"><label class="form-label">樓層與電梯</label><div class="row"><div class="col-7"><select class="form-select" id="buildingType" name="buildingType"><option value="住宅有電梯">住宅有電梯</option><option value="透天或公寓">透天或公寓</option></select></div><div class="col-5"><input type="number" class="form-control" name="floor" value="1"></div></div></div>
                <div class="mb-3"><label class="form-label">其他描述</label><textarea class="form-control" name="description" rows="2"></textarea></div>
                <button type="button" class="btn btn-primary w-100" onclick="nextStep(2)">下一步</button>
            </div>
            <button type="submit" class="btn btn-success w-100">完成送出</button>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
