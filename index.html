<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空調估價與預約系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 600px; margin-top: 30px; margin-bottom: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn-next { background-color: #007bff; color: white; width: 100%; margin-top: 20px; }
        .btn-line { background-color: #00b900; color: white; width: 100%; margin-top: 20px; font-weight: bold; }
        label { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 class="text-center mb-4">空調專業估價</h2>
        
        <div id="step1" class="step active">
            <h5>1. 基本需求填寫</h5>
            <label>服務類型</label>
            <select class="form-select" id="serviceType">
                <option>安裝</option><option>維修</option><option>清洗保養</option><option>拆、移機</option>
            </select>

            <label>冷氣類型</label>
            <select class="form-select" id="acType">
                <option>分離式變頻空調冷氣</option><option>窗型變頻空調冷氣</option>
            </select>

            <label>預計安裝坪數</label>
            <select class="form-select" id="roomSize"></select>

            <label>室外機架</label>
            <select class="form-select" id="acBracket">
                <option value="0">不需架子(落地)</option>
                <option value="1000">室外機L架(鍍鋅)+1,000</option>
                <option value="2000">室外機L架(白鐵)+2,000</option>
                <option value="2000">室外機豪華H架(鍍鋅)+2,000</option>
                <option value="3000">室外機豪華H架(白鐵)+3,000</option>
                <option value="800">室外機落地架(塑鋼)+800</option>
            </select>

            <label>室內機排水器</label>
            <select class="form-select" id="drainPump">
                <option value="0">不需要</option>
                <option value="2800">室內機靜音排水器+2,800</option>
            </select>

            <label>超出標配銅管 (米)</label>
            <select class="form-select" id="copperPipe">
                <option value="0">不需超出</option>
                <option value="450">2分/3分 ($450/米)</option>
                <option value="550">2分/4分 ($550/米)</option>
                <option value="650">2分/5分 ($650/米)</option>
            </select>

            <label>舊機拆除 (無安裝新機時)</label>
            <select class="form-select" id="oldRemove">
                <option value="0">不需拆除</option>
                <option value="1500">窗型冷氣舊機拆除+1,500</option>
                <option value="1800">分離式冷氣舊機拆除+1,800</option>
            </select>

            <label>電源線配置 (室外機附近無220V)</label>
            <select class="form-select" id="powerLine">
                <option value="0">不需配線</option>
                <option value="100">電源配線 2.2mm ($100/米)</option>
                <option value="150">電源配線 3.5mm ($150/米)</option>
                <option value="180">電源配線 5.5mm ($180/米)</option>
            </select>

            <label>樓層類型</label>
            <select class="form-select" id="floorType" onchange="updateFloorOptions()">
                <option value="elevator">電梯大樓</option>
                <option value="stairs">透天或公寓</option>
            </select>

            <label>樓層數</label>
            <select class="form-select" id="floorNumber"></select>

            <label>問題描述</label>
            <textarea class="form-control" id="description" rows="3" placeholder="請填寫您的具體需求..."></textarea>

            <button class="btn btn-next" onclick="nextStep(2)">下一步：選擇品牌</button>
        </div>

        <div id="step2" class="step">
            <h5>2. 品牌與系列選擇</h5>
            <label>選擇品牌</label>
            <select class="form-select" id="brandSelect" onchange="updateSeriesOptions()"></select>

            <label>選擇系列</label>
            <select class="form-select" id="seriesSelect"></select>

            <button class="btn btn-secondary mt-3 w-100" onclick="prevStep(1)">回上一步</button>
            <button class="btn btn-next" onclick="nextStep(3)">下一步：預約師傅</button>
        </div>

        <div id="step3" class="step">
            <h5>3. 填寫預約資料</h5>
            <label>姓名</label>
            <input type="text" class="form-control" id="userName" required>
            
            <label>家用電話</label>
            <input type="tel" class="form-control" id="telHome">
            
            <label>行動電話</label>
            <input type="tel" class="form-control" id="telMobile" required>
            
            <label>地址</label>
            <input type="text" class="form-control" id="address" required>
            
            <label>希望日期 (週日不開放)</label>
            <input type="date" class="form-control" id="bookDate" onchange="checkSunday(this)">
            
            <label>希望時段</label>
            <select class="form-select" id="bookTime">
                <option>上午 (09:00 - 12:00)</option>
                <option>下午 (13:30 - 17:30)</option>
                <option>晚上 (18:00 - 20:00)</option>
            </select>

            <p class="text-danger mt-3 small">* 提交後將開啟 LINE 並導向 Google 表單</p>
            <button class="btn btn-line" onclick="submitToAll()">聯絡客服確認品牌型號報價</button>
            <button class="btn btn-secondary mt-2 w-100" onclick="prevStep(2)">回上一步</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
