<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷氣安裝線上估價系統</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .btn-line { background-color: #00b900; color: white; }
        .btn-line:hover { background-color: #009900; color: white; }
        .img-preview-hint { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="card p-4">
        <h2 class="text-center mb-4">冷氣安裝估價單</h2>
        
        <form id="estimationForm">
            <div class="step active" id="step1">
                <h4>第一步：基本需求</h4>
                <div class="mb-3">
                    <label class="form-label">服務類型</label>
                    <select class="form-select" name="serviceType" required>
                        <option value="安裝">安裝</option>
                        <option value="拆,移機">拆,移機</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">冷氣類型</label>
                    <select class="form-select" id="acType" name="acType" required>
                        <option value="分離式變頻空調冷氣">分離式變頻空調冷氣</option>
                        <option value="窗型變頻空調冷氣">窗型變頻空調冷氣</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">預計安裝坪數</label>
                    <select class="form-select" id="areaSize" name="areaSize" required></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">室外機架</label>
                    <select class="form-select" name="bracket">
                        <option value="不需架子(落地)" data-price="0">不需架子(落地)</option>
                        <option value="室外機L架(鍍鋅)" data-price="1000">室外機L架(鍍鋅) +$1,000</option>
                        <option value="室外機L架(白鐵)" data-price="2000">室外機L架(白鐵) +$2,000</option>
                        <option value="室外機豪華H架(鍍鋅)" data-price="2000">室外機豪華H架(鍍鋅) +$2,000</option>
                        <option value="室外機豪華H架(白鐵)" data-price="3000">室外機豪華H架(白鐵) +$3,000</option>
                        <option value="室外機落地架(塑鋼)" data-price="800">室外機落地架(塑鋼) +$800</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">室內機排水器</label>
                    <select class="form-select" name="drainPump">
                        <option value="不需要" data-price="0">不需要</option>
                        <option value="室內機靜音排水器" data-price="2800">室內機靜音排水器 +$2,800</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">超出標配銅管米數 (單價/米)</label>
                    <div class="row">
                        <div class="col-7">
                            <select class="form-select" name="extraPipe">
                                <option value="不需要" data-price="0">不需要</option>
                                <option value="2分/3分" data-price="450">2分/3分 ($450/米)</option>
                                <option value="2分/4分" data-price="550">2分/4分 ($550/米)</option>
                                <option value="2分/5分" data-price="650">2分/5分 ($650/米)</option>
                            </select>
                        </div>
                        <div class="col-5">
                            <input type="number" class="form-control" name="pipeLength" placeholder="米數" min="0" value="0">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">舊機拆除</label>
                    <select class="form-select" name="oldRemoval">
                        <option value="不需要" data-price="0">不需要</option>
                        <option value="窗型冷氣舊機拆除" data-price="1500">窗型冷氣舊機拆除 +$1,500</option>
                        <option value="分離式冷氣舊機拆除" data-price="1800">分離式冷氣舊機拆除 +$1,800</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">電源線配置 (單價/米)</label>
                    <div class="row">
                        <div class="col-7">
                            <select class="form-select" name="powerWire">
                                <option value="不需要" data-price="0">不需要</option>
                                <option value="2.2mm" data-price="100">2.2mm ($100/米)</option>
                                <option value="3.5mm" data-price="150">3.5mm ($150/米)</option>
                                <option value="5.5mm" data-price="180">5.5mm ($180/米)</option>
                            </select>
                        </div>
                        <div class="col-5">
                            <input type="number" class="form-control" name="wireLength" placeholder="米數" min="0" value="0">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">樓層環境</label>
                    <div class="row">
                        <div class="col-7">
                            <select class="form-select" id="buildingType" name="buildingType" onchange="updateFloorLimit()">
                                <option value="住宅有電梯/電梯大樓">住宅有電梯/電梯大樓</option>
                                <option value="透天或公寓">透天或公寓</option>
                            </select>
                        </div>
                        <div class="col-5">
                            <input type="number" class="form-control" name="floor" id="floor" min="1" max="30" value="1">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">其他問題描述 (如西曬、危險安裝)</label>
                    <textarea class="form-control" name="description" rows="3" placeholder="請描述您的特殊需求"></textarea>
                </div>

                <button type="button" class="btn btn-primary w-100" onclick="nextStep(2)">下一步：選擇品牌與型號</button>
            </div>

            <div class="step" id="step2">
                <h4>第二步：型號與照片</h4>
                <div class="mb-3">
                    <label class="form-label">品牌</label>
                    <select class="form-select" id="brandSelect" name="brand" onchange="updateModels()">
                        <option value="">請選擇品牌</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">系列型號</label>
                    <select class="form-select" id="modelSelect" name="model">
                        <option value="">請先選擇品牌</option>
                    </select>
                </div>

                <hr>
                
                <div class="mb-4">
                    <label class="form-label">上傳現場照片 (最多5張)</label>
                    <input type="file" class="form-control" id="siteImages" accept="image/*" multiple onchange="validateFiles(this)">
                    <div class="img-preview-hint mt-1">* 建議拍攝：安裝位置、室外機放置處、電箱。</div>
                </div>

                <div class="row">
                    <div class="col"><button type="button" class="btn btn-secondary w-100" onclick="prevStep(1)">上一步</button></div>
                    <div class="col"><button type="button" class="btn btn-primary w-100" onclick="nextStep(3)">最後一步</button></div>
                </div>
            </div>

            <div class="step" id="step3">
                <h4>第三步：聯絡與預約</h4>
                <div class="mb-3"><label class="form-label">姓名</label><input type="text" class="form-control" name="userName" required></div>
                <div class="mb-3"><label class="form-label">行動電話</label><input type="tel" class="form-control" name="mobile" required></div>
                <div class="mb-3"><label class="form-label">安裝地址</label><input type="text" class="form-control" name="address" required></div>
                <div class="mb-3">
                    <label class="form-label">希望日期 (週日不開放)</label>
                    <input type="date" class="form-control" name="bookDate" id="bookDate" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">希望時段</label>
                    <select class="form-select" name="bookTime">
                        <option value="早上 (09:00~12:00)">早上 (09:00~12:00)</option>
                        <option value="下午 (13:00~17:00)">下午 (13:00~17:00)</option>
                    </select>
                </div>

                <div class="alert alert-info">
                    <strong>預估工資總金額：NT$ <span id="totalPrice">0</span></strong>
                    <br><small>*此工資為預估，實際將由客服針對品牌型號與現場環境重新確認報價。</small>
                </div>

                <button type="submit" class="btn btn-success w-100 mb-2">確認並送出估價單</button>
                <button type="button" class="btn btn-secondary w-100" onclick="prevStep(2)">上一步</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
