<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空調估價預約系統</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .page { display: none; }
        .active { display: block; }
        .step-header { background: #f8f9fa; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div id="page1" class="page active">
        <div class="step-header"><h2>第一步：填寫需求</h2></div>
        <form id="calcForm">
            <div class="mb-3">
                <label class="form-label">服務類型</label>
                <select class="form-select" id="serviceType" required>
                    <option value="安裝">安裝</option>
                    <option value="維修">維修</option>
                    <option value="清洗保養">清洗保養</option>
                    <option value="拆,移機">拆,移機</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">冷氣類型</label>
                <select class="form-select" id="acType" required>
                    <option value="分離式">分離式變頻空調冷氣</option>
                    <option value="窗型">窗型變頻空調冷氣</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">預計安裝坪數</label>
                <select class="form-select" id="sizeRange" required>
                    </select>
            </div>

            <div class="mb-3">
                <label class="form-label">額外配件 (可複選)</label>
                <div id="accessoryList" class="p-3 border bg-white">
                    </div>
            </div>

            <div class="mb-3">
                <label class="form-label">樓層</label>
                <div class="row">
                    <div class="col-6">
                        <select class="form-select" id="buildingType">
                            <option value="電梯">電梯大樓</option>
                            <option value="透天/公寓">透天或公寓</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="number" class="form-control" id="floorNum" placeholder="樓層" min="1" max="30">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">冷氣問題/需求描述</label>
                <textarea class="form-control" id="description" rows="3"></textarea>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="goToPage(2)">下一步：查看估價與推薦</button>
        </form>
    </div>

    <div id="page2" class="page">
        <div class="step-header"><h2>第二步：預估費用與推薦型號</h2></div>
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h4 class="card-title text-primary">估價結果</h4>
                <div id="quoteDetail" class="fs-5"></div>
                <hr>
                <h5>依您的坪數推薦品牌與型號 (全國電子同步參考)</h5>
                <div id="recommendations" class="row">
                    </div>
            </div>
        </div>
        <button type="button" class="btn btn-outline-secondary mb-2 w-100" onclick="goToPage(1)">返回修改</button>
        <button type="button" class="btn btn-success w-100" onclick="goToPage(3)">前往預約師傅</button>
    </div>

    <div id="page3" class="page">
        <div class="step-header"><h2>第三步：填寫聯繫資訊</h2></div>
        <form id="bookingForm">
            <div class="mb-3"><label class="form-label">姓名</label><input type="text" class="form-control" id="userName" required></div>
            <div class="mb-3"><label class="form-label">家用電話</label><input type="tel" class="form-control" id="homePhone"></div>
            <div class="mb-3"><label class="form-label">行動電話</label><input type="tel" class="form-control" id="mobilePhone" required></div>
            <div class="mb-3"><label class="form-label">地址</label><input type="text" class="form-control" id="address" required></div>
            <div class="mb-3">
                <label class="form-label">希望日期 (週日不開放)</label>
                <input type="date" class="form-control" id="bookDate" required>
            </div>
            <div class="mb-3">
                <label class="form-label">希望時段</label>
                <select class="form-select" id="bookTime">
                    <option value="上午 09:00-12:00">上午 09:00-12:00</option>
                    <option value="下午 13:00-17:00">下午 13:00-17:00</option>
                </select>
            </div>
            <p class="text-muted small">* 照片上傳請於送出後在 Google 表單中完成</p>
            <button type="button" class="btn btn-danger w-100 mb-2" onclick="submitToLine()">透過 LINE 預約 (快速)</button>
            <button type="button" class="btn btn-primary w-100" onclick="submitToGoogle()">送出並上傳照片 (Google 表單)</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
