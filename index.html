<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷氣安裝線上估價系統</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .btn-line { background-color: #00b900; color: white; }
        .btn-line:hover { background-color: #009900; color: white; }
    </style>
</head>
<body>
<div class="container mb-5">
    <div class="card p-4">
        <h2 class="text-center mb-4">冷氣安裝估價單</h2>
        <form id="estimationForm">
            <div class="step active" id="step1">
                <h4>第一步：基本需求</h4>
                <div class="mb-3">
                    <label class="form-label">服務類型</label>
                    <select class="form-select" name="serviceType"><option value="安裝">安裝</option><option value="拆,移機">拆,移機</option></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">冷氣類型</label>
                    <select class="form-select" id="acType" name="acType"><option value="分離式變頻空調冷氣">分離式變頻空調冷氣</option><option value="窗型變頻空調冷氣">窗型變頻空調冷氣</option></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">預計安裝坪數</label>
                    <select class="form-select" id="areaSize" name="areaSize"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">室外機架</label>
                    <select class="form-select" name="bracket">
                        <option value="不需架子(落地)" data-price="0">不需架子(落地)</option>
                        <option value="室外機L架(鍍鋅)" data-price="1000">室外機L架(鍍鋅) +$1,000</option>
                        <option value="室外機L架(白鐵)" data-price="2000">室外機L架(白鐵) +$2,000</option>
                    </select>
                </div>
                <button type="button" class="btn btn-primary w-100" onclick="nextStep(2)">下一步</button>
            </div>
            <div class="step" id="step2">
                <h4>第二步：品牌與型號</h4>
                <div class="mb-3"><label class="form-label">品牌</label><select class="form-select" id="brandSelect" name="brand" onchange="updateModels()"></select></div>
                <div class="mb-3"><label class="form-label">型號</label><select class="form-select" id="modelSelect" name="model"></select></div>
                <div class="mb-3"><label class="form-label">現場照片</label><input type="file" class="form-control" id="siteImages" name="siteImages" multiple></div>
                <div class="row"><div class="col"><button type="button" class="btn btn-secondary w-100" onclick="prevStep(1)">上一步</button></div><div class="col"><button type="button" class="btn btn-primary w-100" onclick="nextStep(3)">下一步</button></div></div>
            </div>
            <div class="step" id="step3">
                <h4>第三步：聯絡資訊</h4>
                <div class="mb-3"><label class="form-label">姓名</label><input type="text" class="form-control" name="userName" required></div>
                <div class="mb-3"><label class="form-label">手機</label><input type="tel" class="form-control" name="mobile" required></div>
                <div class="alert alert-info"><strong>預估總金額：NT$ <span id="totalPrice">0</span></strong></div>
                <button type="submit" class="btn btn-success w-100 mb-2">完成送出</button>
                <button type="button" class="btn btn-secondary w-100" onclick="prevStep(2)">上一步</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
